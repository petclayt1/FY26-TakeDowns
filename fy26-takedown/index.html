<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FY26 Final Take Down Targets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0c1222;
      --bg-card: #141c2f;
      --border: rgba(125, 168, 255, 0.12);
      --text: #e8ecf4;
      --muted: #8b95a8;
      --accent: #6b9fff;
      --accent-soft: rgba(107, 159, 255, 0.15);
      --glow: rgba(107, 159, 255, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      background-image:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(107, 159, 255, 0.18), transparent),
        radial-gradient(ellipse 60% 40% at 100% 50%, rgba(80, 120, 200, 0.08), transparent);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.75rem;
    }

    header h1 {
      font-family: "Instrument Serif", Georgia, serif;
      font-weight: 400;
      font-size: clamp(2.25rem, 5vw, 3.25rem);
      letter-spacing: -0.02em;
      margin: 0 0 0.5rem;
      background: linear-gradient(135deg, #fff 0%, #a8c4ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    header p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .closed-total {
      margin: 1.75rem auto 0;
      max-width: 22rem;
      padding: 0.85rem 1.25rem;
      border-radius: 12px;
      border: 1px solid rgba(90, 200, 130, 0.45);
      background: rgba(40, 110, 70, 0.22);
      box-shadow: 0 0 24px -8px rgba(80, 200, 120, 0.2);
    }

    .closed-total-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(180, 235, 200, 0.85);
      margin-bottom: 0.35rem;
    }

    .closed-total-value {
      display: block;
      font-size: 1.65rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #9cf0c0;
      letter-spacing: -0.02em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }

    .card {
      --card-border: rgba(220, 90, 90, 0.55);
      --card-bg: rgba(120, 40, 45, 0.22);
      --card-glow: rgba(220, 80, 80, 0.25);
      cursor: pointer;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 1.25rem 1.35rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s, background 0.2s;
    }

    .card:has(.closed-toggle:checked) {
      --card-border: rgba(90, 200, 130, 0.6);
      --card-bg: rgba(40, 110, 70, 0.28);
      --card-glow: rgba(80, 200, 120, 0.3);
    }

    .card:not(:has(.closed-toggle:checked)):hover {
      border-color: rgba(240, 130, 130, 0.75);
      box-shadow: 0 0 0 1px rgba(220, 90, 90, 0.2), 0 12px 36px -10px var(--card-glow);
      transform: translateY(-2px);
    }

    .card:has(.closed-toggle:checked):hover {
      border-color: rgba(130, 230, 170, 0.85);
      box-shadow: 0 0 0 1px rgba(80, 200, 120, 0.25), 0 12px 36px -10px var(--card-glow);
      transform: translateY(-2px);
    }

    .card-body {
      flex: 1;
    }

    .closed-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      user-select: none;
      font-size: 0.85rem;
      color: var(--muted);
      margin: 0;
    }

    .closed-row:hover {
      color: var(--text);
    }

    .closed-toggle {
      appearance: none;
      -webkit-appearance: none;
      width: 1.125rem;
      height: 1.125rem;
      margin: 0;
      flex-shrink: 0;
      border-radius: 50%;
      border: 2px solid rgba(255, 120, 120, 0.75);
      background: rgba(40, 20, 25, 0.5);
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }

    .closed-toggle:checked {
      border-color: rgba(120, 230, 160, 0.95);
      background: radial-gradient(circle at 50% 50%, #5fd68a 38%, transparent 40%);
      box-shadow: 0 0 0 2px rgba(80, 200, 120, 0.25);
    }

    .card:has(.closed-toggle:checked) .closed-toggle {
      border-color: rgba(120, 230, 160, 0.95);
    }

    .card:has(.closed-toggle:checked) .closed-row {
      color: rgba(180, 235, 200, 0.95);
    }

    .card-name {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 0 0 0.65rem;
      line-height: 1.3;
    }

    .card-acv {
      margin: 0;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .card-acv strong {
      display: block;
      margin-top: 0.35rem;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: none;
      color: #ffb4b4;
      font-variant-numeric: tabular-nums;
    }

    .card:has(.closed-toggle:checked) .card-acv strong {
      color: #9cf0c0;
    }

    footer {
      margin-top: 3rem;
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .btn-save {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      z-index: 20;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.55rem 1.15rem;
      border-radius: 10px;
      border: 1px solid rgba(107, 159, 255, 0.45);
      background: rgba(20, 28, 47, 0.92);
      color: var(--text);
      cursor: pointer;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .btn-save:hover {
      background: rgba(107, 159, 255, 0.18);
      border-color: rgba(140, 185, 255, 0.65);
    }

    .btn-save:active {
      transform: scale(0.98);
    }

    .btn-save.is-done {
      border-color: rgba(90, 200, 130, 0.55);
      color: #9cf0c0;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }

    .modal.is-open {
      opacity: 1;
      visibility: visible;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(4, 8, 18, 0.72);
      backdrop-filter: blur(6px);
    }

    .modal-panel {
      position: relative;
      width: min(100%, 28rem);
      max-height: min(90vh, 34rem);
      display: flex;
      flex-direction: column;
      padding: 1.35rem 1.35rem 1.15rem;
      border-radius: 16px;
      border: 1px solid rgba(107, 159, 255, 0.28);
      background: #121a2e;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.55);
    }

    .modal-close {
      position: absolute;
      top: 0.65rem;
      right: 0.65rem;
      width: 2.25rem;
      height: 2.25rem;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font-size: 1.35rem;
      line-height: 1;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.12);
      color: var(--text);
    }

    .modal-title {
      font-family: "Instrument Serif", Georgia, serif;
      font-weight: 400;
      font-size: 1.5rem;
      margin: 0 2.25rem 0.35rem 0;
      line-height: 1.2;
      color: var(--text);
    }

    .modal-sub {
      margin: 0 0 1rem;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .modal-sub strong {
      color: var(--accent);
      font-weight: 600;
    }

    .notes-history-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 0 0 0.5rem;
    }

    .notes-history {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      margin-bottom: 1rem;
      padding-right: 0.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .notes-empty {
      margin: 0;
      font-size: 0.88rem;
      color: var(--muted);
      font-style: italic;
    }

    .note-entry {
      padding: 0.65rem 0.75rem;
      border-radius: 10px;
      background: rgba(107, 159, 255, 0.08);
      border: 1px solid rgba(107, 159, 255, 0.12);
    }

    .note-entry time {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: rgba(156, 240, 192, 0.9);
      margin-bottom: 0.4rem;
      font-variant-numeric: tabular-nums;
    }

    .note-entry p {
      margin: 0;
      font-size: 0.9rem;
      line-height: 1.45;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .notes-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 0 0 0.45rem;
    }

    .notes-input {
      width: 100%;
      resize: vertical;
      min-height: 5.5rem;
      margin-bottom: 0.85rem;
      padding: 0.65rem 0.75rem;
      border-radius: 10px;
      border: 1px solid rgba(125, 168, 255, 0.2);
      background: rgba(8, 12, 24, 0.65);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .notes-input:focus {
      outline: none;
      border-color: rgba(107, 159, 255, 0.5);
      box-shadow: 0 0 0 2px rgba(107, 159, 255, 0.15);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }

    .btn-note-save {
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.55rem 1.1rem;
      border-radius: 10px;
      border: 1px solid rgba(90, 200, 130, 0.5);
      background: rgba(40, 110, 70, 0.35);
      color: #9cf0c0;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-note-save:hover {
      background: rgba(40, 110, 70, 0.5);
      border-color: rgba(120, 230, 160, 0.65);
    }

    body.modal-open {
      overflow: hidden;
    }
  </style>
</head>
<body>
  <button type="button" class="btn-save" id="btn-save" aria-live="polite">Save</button>
  <div class="wrap">
    <header>
      <h1>FY26 Final Take Down Targets</h1>
      <p>Open pipeline — annual contract value</p>
      <div class="closed-total" aria-live="polite">
        <span class="closed-total-label">Total closed ACV</span>
        <span class="closed-total-value" id="closed-total-value">$0</span>
      </div>
    </header>

    <div class="grid" id="deals">
      <!-- Cards injected for clarity; static list -->
    </div>

    <footer>Open deals snapshot</footer>
  </div>

  <div class="modal" id="notes-modal" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal tabindex="-1"></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="notes-modal-title">
      <button type="button" class="modal-close" data-close-modal aria-label="Close dialog">×</button>
      <h2 class="modal-title" id="notes-modal-title"></h2>
      <p class="modal-sub" id="notes-modal-acv"></p>
      <p class="notes-history-label" id="notes-history-heading">Saved notes</p>
      <div class="notes-history" id="notes-history"></div>
      <label class="notes-label" for="notes-input">New note</label>
      <textarea id="notes-input" class="notes-input" rows="4" placeholder="Type a note…"></textarea>
      <div class="modal-actions">
        <button type="button" class="btn-note-save" id="btn-note-save">Save note</button>
      </div>
    </div>
  </div>

  <script>
    const deals = [
      { name: "BluelLinx", acv: 80000 },
      { name: "Lendmark", acv: 70000 },
      { name: "Aarons", acv: 70000 },
      { name: "Phoebe", acv: 60000 },
      { name: "Tift", acv: 60000 },
      { name: "NDCP", acv: 60000 },
      { name: "Atlanta Hawks", acv: 60000 },
      { name: "ColPipe", acv: 60000 },
      { name: "RaceTrac", acv: 60000 },
      { name: "Inspire", acv: 60000 },
      { name: "ResultsCX", acv: 60000 },
      { name: "Empire", acv: 60000 },
      { name: "GUCU", acv: 60000 },
      { name: "Americold", acv: 60000 },
      { name: "US Lumber", acv: 60000 },
      { name: "InterEx", acv: 60000 },
      { name: "Artivion", acv: 50000 },
      { name: "Agilisys", acv: 50000 },
      { name: "Synovus", acv: 45000 },
      { name: "AGS", acv: 40000 },
    ];

    const fmt = new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD",
      maximumFractionDigits: 0,
    });

    const STORAGE_KEY = "dealsInFlight_state_v1";
    const NOTES_STORAGE_KEY = "dealsInFlight_notes_v1";
    const tsFmt = new Intl.DateTimeFormat(undefined, {
      dateStyle: "medium",
      timeStyle: "short",
    });

    let notesDealIndex = null;

    const grid = document.getElementById("deals");
    grid.innerHTML = deals
      .map(
        (d, i) => `
      <article class="card" data-deal-index="${i}">
        <div class="card-body">
          <h2 class="card-name">${escapeHtml(d.name)}</h2>
          <p class="card-acv">ACV <strong>${fmt.format(d.acv)}</strong></p>
        </div>
        <label class="closed-row" for="closed-${i}">
          <input type="checkbox" class="closed-toggle" id="closed-${i}" />
          Closed
        </label>
      </article>`
      )
      .join("");

    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }

    function loadNotesStore() {
      try {
        const raw = localStorage.getItem(NOTES_STORAGE_KEY);
        if (!raw) return { v: 1, byName: {} };
        const data = JSON.parse(raw);
        if (!data || data.v !== 1 || typeof data.byName !== "object" || data.byName === null) {
          return { v: 1, byName: {} };
        }
        return data;
      } catch {
        return { v: 1, byName: {} };
      }
    }

    function saveNotesStore(data) {
      localStorage.setItem(NOTES_STORAGE_KEY, JSON.stringify(data));
    }

    function getNotesArray(name) {
      const arr = loadNotesStore().byName[name];
      return Array.isArray(arr) ? arr : [];
    }

    function persistNote(name, text) {
      const store = loadNotesStore();
      const existing = store.byName[name];
      if (!Array.isArray(existing)) store.byName[name] = [];
      store.byName[name].push({ text, at: new Date().toISOString() });
      saveNotesStore(store);
    }

    const notesModal = document.getElementById("notes-modal");
    const notesTitle = document.getElementById("notes-modal-title");
    const notesAcv = document.getElementById("notes-modal-acv");
    const notesInput = document.getElementById("notes-input");
    const notesHistoryEl = document.getElementById("notes-history");
    const notesHistoryHeading = document.getElementById("notes-history-heading");

    function renderNotesHistory(dealName) {
      const notes = getNotesArray(dealName);
      notesHistoryHeading.hidden = notes.length === 0;
      notesHistoryEl.replaceChildren();
      if (notes.length === 0) {
        const empty = document.createElement("p");
        empty.className = "notes-empty";
        empty.textContent = "No saved notes yet.";
        notesHistoryEl.appendChild(empty);
        return;
      }
      const sorted = [...notes].sort((a, b) => new Date(b.at) - new Date(a.at));
      for (const n of sorted) {
        if (typeof n.text !== "string" || typeof n.at !== "string") continue;
        const article = document.createElement("article");
        article.className = "note-entry";
        const timeEl = document.createElement("time");
        timeEl.dateTime = n.at;
        const d = new Date(n.at);
        timeEl.textContent = Number.isNaN(d.getTime()) ? n.at : tsFmt.format(d);
        const p = document.createElement("p");
        p.textContent = n.text;
        article.appendChild(timeEl);
        article.appendChild(p);
        notesHistoryEl.appendChild(article);
      }
    }

    function openNotesModal(dealIndex) {
      const d = deals[dealIndex];
      if (!d) return;
      notesDealIndex = dealIndex;
      notesTitle.textContent = d.name;
      notesAcv.replaceChildren();
      notesAcv.append("ACV ");
      const acvStrong = document.createElement("strong");
      acvStrong.textContent = fmt.format(d.acv);
      notesAcv.appendChild(acvStrong);
      notesInput.value = "";
      renderNotesHistory(d.name);
      notesModal.classList.add("is-open");
      notesModal.setAttribute("aria-hidden", "false");
      document.body.classList.add("modal-open");
      notesInput.focus();
    }

    function closeNotesModal() {
      notesModal.classList.remove("is-open");
      notesModal.setAttribute("aria-hidden", "true");
      document.body.classList.remove("modal-open");
      notesDealIndex = null;
    }

    function loadClosedNames() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return new Set();
        const data = JSON.parse(raw);
        if (!data || data.v !== 1 || !Array.isArray(data.closed)) return new Set();
        return new Set(data.closed.filter((n) => typeof n === "string"));
      } catch {
        return new Set();
      }
    }

    function applyClosedState(closedNames) {
      deals.forEach((d, i) => {
        const el = document.getElementById(`closed-${i}`);
        if (el) el.checked = closedNames.has(d.name);
      });
    }

    const closedTotalEl = document.getElementById("closed-total-value");

    function updateClosedTotal() {
      let total = 0;
      deals.forEach((d, i) => {
        const el = document.getElementById(`closed-${i}`);
        if (el && el.checked) total += d.acv;
      });
      closedTotalEl.textContent = fmt.format(total);
    }

    function persistClosedState() {
      const closed = deals
        .map((d, i) => ({ name: d.name, el: document.getElementById(`closed-${i}`) }))
        .filter((x) => x.el && x.el.checked)
        .map((x) => x.name);
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ v: 1, closed }));
    }

    applyClosedState(loadClosedNames());
    updateClosedTotal();

    grid.addEventListener("change", (e) => {
      const t = e.target;
      if (t && t.classList && t.classList.contains("closed-toggle")) {
        updateClosedTotal();
      }
    });

    grid.addEventListener("click", (e) => {
      if (e.target.closest(".closed-row")) return;
      const card = e.target.closest(".card");
      if (!card || !grid.contains(card)) return;
      const idx = parseInt(card.getAttribute("data-deal-index"), 10);
      if (Number.isNaN(idx)) return;
      openNotesModal(idx);
    });

    notesModal.addEventListener("click", (e) => {
      if (e.target.closest("[data-close-modal]")) closeNotesModal();
    });

    document.getElementById("btn-note-save").addEventListener("click", () => {
      if (notesDealIndex === null) return;
      const d = deals[notesDealIndex];
      const text = notesInput.value.trim();
      if (!text) return;
      try {
        persistNote(d.name, text);
        notesInput.value = "";
        renderNotesHistory(d.name);
      } catch {
        alert("Could not save note. Check storage access.");
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      if (!notesModal.classList.contains("is-open")) return;
      closeNotesModal();
    });

    const btnSave = document.getElementById("btn-save");
    let saveFeedbackTimer;
    btnSave.addEventListener("click", () => {
      try {
        persistClosedState();
        btnSave.textContent = "Saved";
        btnSave.classList.add("is-done");
        clearTimeout(saveFeedbackTimer);
        saveFeedbackTimer = setTimeout(() => {
          btnSave.textContent = "Save";
          btnSave.classList.remove("is-done");
        }, 2000);
      } catch (e) {
        btnSave.textContent = "Save failed";
        clearTimeout(saveFeedbackTimer);
        saveFeedbackTimer = setTimeout(() => {
          btnSave.textContent = "Save";
        }, 2500);
      }
    });
  </script>
</body>
</html>
